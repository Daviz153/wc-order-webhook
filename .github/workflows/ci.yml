name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint & CodeSniffer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs, composer

      - name: PHP 문법 검사
        run: find . -name '*.php' -not -path './.git/*' | xargs -P4 php -l | grep -v "No syntax errors" || true

      - name: Install PHPCS WordPress Standards
        run: composer install --no-interaction --quiet

      - name: PHPCS — WordPress 코딩 스탠다드
        run: ./vendor/bin/phpcs --report=summary

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start wp-env (WordPress + WooCommerce)
        run: npx wp-env start
        timeout-minutes: 5

      - name: Activate plugins & 초기 설정
        run: |
          npx wp-env run cli wp plugin activate woocommerce --quiet
          npx wp-env run cli wp plugin activate wc-order-webhook --quiet
          npx wp-env run cli wp option update blogname "E2E Test Site" --quiet

      - name: 테스트용 상품 생성
        id: create_product
        run: |
          PRODUCT_ID=$(npx wp-env run cli wp post create \
            --post_type=product \
            --post_title="E2E 테스트 상품" \
            --post_status=publish \
            --porcelain)
          echo "product_id=${PRODUCT_ID}" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests
        run: npx playwright test
        env:
          WP_URL: http://localhost:8888
          WP_ADMIN: admin
          WP_PASS: password
          E2E_PRODUCT_ID: ${{ steps.create_product.outputs.product_id }}

      - name: Upload Playwright report (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
